services:
  - type: web
    name: cti-hub-platform
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ctihub.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cti-hub-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: cti-hub-db
    plan: free
